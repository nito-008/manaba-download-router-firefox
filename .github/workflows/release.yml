name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to publish as a GitHub Release, for example v1.0.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build Firefox release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        if: github.ref_type == 'tag' || github.event.inputs.release_tag != ''
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            echo "Use npm run release -- $TAG_VERSION to create release commits and tags."
            exit 1
          fi

      - name: Typecheck
        run: npm run compile

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Lint extension package
        run: npx --yes web-ext lint --source-dir .output/firefox-mv3

      - name: Create release archives
        run: npm run zip:firefox

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp .output/*-firefox.zip .output/*-sources.zip release-assets/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-release
          path: release-assets/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag' || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: release-assets/*.zip
          generate_release_notes: true
